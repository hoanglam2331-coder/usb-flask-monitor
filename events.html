<!DOCTYPE html>
<html>

<body>

<h2>USB Events</h2>

<table border="1">

<tr>

<th>Time</th>
<th>Computer</th>
<th>IP</th>
<th>Device</th>
<th>Event</th>

</tr>

{% for row in rows %}

<tr>

<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
